<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Login de Administrador</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <link rel="shortcut icon" href="images/icons/admin-page-icon.png" />
    <style>
      :root {
        --color-bg-from: #1f2d3d;
        --color-bg-to: #2c3e50;
        --color-primary: #6495ed;
        --color-primary-hover: #4a7fd4;
        --color-white: #ffffff;
        --color-dark: #1a1a1a;
        --color-input-bg: #f9f9f9;
        --color-border: #d3d9df;
        --color-muted: #6c757d;
        --font-family-base: "Quicksand", "Poppins", sans-serif;
        --radius-md: 12px;
        --radius-sm: 8px;
        --transition-fast: 0.2s ease-in-out;
        --transition-smooth: 0.4s ease;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: var(--font-family-base);
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(155deg, var(--color-bg-from) 0%, var(--color-bg-to) 100%);
        color: var(--color-dark);
        overflow: hidden;
        position: relative;
      }

      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 40% at 20% 80%, rgba(100, 149, 237, 0.08) 0%, transparent 70%),
          radial-gradient(ellipse 50% 50% at 80% 10%, rgba(100, 149, 237, 0.06) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      .particles {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      /* ── Login Card ── */
      .login-card {
        position: relative;
        background: var(--color-white);
        border-radius: 4px;
        border-top: 3px solid var(--color-primary);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
        z-index: 1;
        animation: fadeIn var(--transition-smooth);
        overflow: hidden;
      }

      /* ── Header ── */
      .login-header {
        background: #f8f9fb;
        border-bottom: 1px solid #e8eaed;
        padding: 1.4rem 1.75rem 1.2rem;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background-image: url(images/perfil-leotaborda.JPEG);
        background-size: cover;
        background-position: center;
        flex-shrink: 0;
      }

      .brand-text h1 {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--color-bg-from);
        margin: 0 0 1px;
        letter-spacing: 0.01em;
      }

      .brand-text p {
        font-size: 0.7rem;
        color: var(--color-muted);
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 500;
      }

      .admin-badge {
        margin-left: auto;
        background: #eef3fd;
        color: var(--color-primary-hover);
        font-size: 0.65rem;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 2px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border: 1px solid #d0dcf8;
      }

      /* ── Body ── */
      .login-body {
        padding: 1.6rem 1.75rem 1.75rem;
      }

      .login-body h2 {
        font-size: 1rem;
        font-weight: 700;
        color: var(--color-dark);
        margin: 0 0 3px;
        letter-spacing: 0.01em;
      }

      .note {
        font-size: 0.78rem;
        color: var(--color-muted);
        margin: 0 0 1.4rem;
      }

      /* ── Fields ── */
      .input-group {
        margin-bottom: 1rem;
      }

      .input-group label {
        display: block;
        font-size: 0.73rem;
        font-weight: 600;
        color: #444f5a;
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .input-wrap {
        position: relative;
      }

      .input-wrap input {
        width: 100%;
        padding: 0.62rem 2.2rem 0.62rem 0.85rem;
        border: 1px solid var(--color-border);
        border-radius: 2px;
        background: var(--color-input-bg);
        font-size: 0.88rem;
        font-family: var(--font-family-base);
        color: var(--color-dark);
        outline: none;
        transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        box-sizing: border-box;
      }

      .input-wrap input:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(100, 149, 237, 0.15);
        background: #fff;
      }

      .input-wrap input.input-error {
        border-color: #dc2626;
        box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.12);
      }

      .input-icon {
        position: absolute;
        right: 0.7rem;
        top: 50%;
        transform: translateY(-50%);
        color: #adb5bd;
        display: flex;
        align-items: center;
        font-size: 16px;
        pointer-events: none;
      }

      /* Oculta olhinho nativo dos navegadores (Edge/IE, Chrome, Safari) */
      input[type="password"]::-ms-reveal,
      input[type="password"]::-ms-clear,
      input[type="password"]::-webkit-contacts-auto-fill-button,
      input[type="password"]::-webkit-credentials-auto-fill-button {
        display: none !important;
        visibility: hidden;
        pointer-events: none;
      }

      /* ── Submit Button ── */
      button[type="submit"] {
        width: 100%;
        padding: 0.72rem;
        font-size: 0.88rem;
        font-weight: 700;
        border: none;
        border-radius: 2px;
        color: var(--color-white);
        background: var(--color-primary);
        cursor: pointer;
        font-family: var(--font-family-base);
        letter-spacing: 0.05em;
        text-transform: uppercase;
        transition: background var(--transition-fast), transform 0.1s, opacity var(--transition-fast);
        margin-top: 0.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      button[type="submit"]:hover:not(:disabled) {
        background: var(--color-primary-hover);
      }

      button[type="submit"]:active:not(:disabled) {
        transform: scale(0.99);
      }

      button[type="submit"]:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
        flex-shrink: 0;
      }


      /* ── Toast System ── */
      #toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 9999;
        width: 300px;
      }

      .toast {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        background: #fff;
        border-radius: 3px;
        padding: 12px 14px;
        border-left: 3px solid var(--color-primary);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.18);
        font-family: var(--font-family-base);
        animation: toastIn 0.22s ease forwards;
        position: relative;
        overflow: hidden;
      }

      .toast.removing {
        animation: toastOut 0.2s ease forwards;
      }

      .toast-icon {
        font-size: 16px;
        flex-shrink: 0;
        margin-top: 1px;
      }

      .toast-content {
        flex: 1;
      }

      .toast-title {
        font-size: 0.75rem;
        font-weight: 700;
        color: #1f2d3d;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 2px;
      }

      .toast-msg {
        font-size: 0.76rem;
        color: var(--color-muted);
        line-height: 1.4;
      }

      .toast-close {
        font-size: 13px;
        color: #adb5bd;
        cursor: pointer;
        flex-shrink: 0;
        line-height: 1;
        margin-top: 1px;
        transition: color var(--transition-fast);
      }

      .toast-close:hover {
        color: #555;
      }

      .toast-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 2px;
        background: currentColor;
        opacity: 0.3;
        animation: toastProgress linear forwards;
      }

      .toast.error   { border-left-color: #dc2626; }
      .toast.error   .toast-icon     { color: #dc2626; }
      .toast.error   .toast-progress { color: #dc2626; }

      .toast.success { border-left-color: #16a34a; }
      .toast.success .toast-icon     { color: #16a34a; }
      .toast.success .toast-progress { color: #16a34a; }

      .toast.warning { border-left-color: #d97706; }
      .toast.warning .toast-icon     { color: #d97706; }
      .toast.warning .toast-progress { color: #d97706; }

      .toast.info    { border-left-color: var(--color-primary); }
      .toast.info    .toast-icon     { color: var(--color-primary); }
      .toast.info    .toast-progress { color: var(--color-primary); }

      /* ── Animations ── */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes toastIn {
        from { opacity: 0; transform: translateX(20px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      @keyframes toastOut {
        from { opacity: 1; transform: translateX(0); max-height: 100px; }
        to   { opacity: 0; transform: translateX(20px); max-height: 0; padding: 0; margin-bottom: -8px; }
      }

      @keyframes toastProgress {
        from { width: 100%; }
        to   { width: 0%; }
      }

      @media (max-width: 480px) {
        .login-body { padding: 1.4rem 1.25rem 1.5rem; }
        .login-header { padding: 1.2rem 1.25rem 1rem; }
        .login-footer { padding: 0.65rem 1.25rem; }
        #toast-container { width: calc(100vw - 32px); right: 16px; }
      }
    </style>
  </head>
  <body>

    <canvas class="particles" id="particlesCanvas"></canvas>

    <div id="toast-container" role="region" aria-live="polite" aria-label="Notificações"></div>

    <div class="login-card">

      <div class="login-header">
        <div class="brand-avatar"></div>
        <div class="brand-text">
          <h1>Leonardo Taborda</h1>
          <p>Área administrativa</p>
        </div>
        <span class="admin-badge">Admin</span>
      </div>

      <div class="login-body">
        <h2>Autenticação</h2>
        <p class="note">Insira suas credenciais para acessar o painel</p>

        <form id="loginForm" novalidate>

          <div class="input-group">
            <label for="email">E-mail corporativo</label>
            <div class="input-wrap">
              <input
                type="email"
                id="email"
                name="email"
                required
                autocomplete="username"
                placeholder="seu@email.com"
              />
              <span class="input-icon" aria-hidden="true">
                <i class="ti ti-mail"></i>
              </span>
            </div>
          </div>

          <div class="input-group">
            <label for="password">Senha</label>
            <div class="input-wrap">
              <input
                type="password"
                id="password"
                name="password"
                required
                autocomplete="current-password"
                placeholder="••••••••"
              />
            </div>
          </div>

          <button type="submit" id="submitBtn">
            <span class="btn-spinner" id="btnSpinner"></span>
            <span id="btnText">Entrar no painel</span>
          </button>

        </form>
      </div>



    </div>

    <!-- Firebase Auth SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import { firebaseConfig } from "/js/firebase-config.js";

      const app  = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      const form      = document.getElementById("loginForm");
      const submitBtn = document.getElementById("submitBtn");
      const btnSpinner = document.getElementById("btnSpinner");
      const btnText   = document.getElementById("btnText");

      function setLoading(on) {
        submitBtn.disabled     = on;
        btnSpinner.style.display = on ? "block" : "none";
        btnText.textContent    = on ? "Verificando..." : "Entrar no painel";
      }

      const ERROR_MESSAGES = {
        "auth/invalid-credential":      ["Credenciais inválidas",  "E-mail ou senha incorretos. Verifique e tente novamente."],
        "auth/user-not-found":          ["Usuário não encontrado", "Nenhuma conta encontrada com este e-mail."],
        "auth/wrong-password":          ["Senha incorreta",        "A senha informada está errada."],
        "auth/too-many-requests":       ["Muitas tentativas",      "Conta temporariamente bloqueada. Tente novamente mais tarde."],
        "auth/network-request-failed":  ["Erro de rede",           "Verifique sua conexão com a internet e tente novamente."],
        "auth/user-disabled":           ["Conta desativada",       "Esta conta foi desativada. Entre em contato com o suporte."],
        "auth/invalid-email":           ["E-mail inválido",        "O formato do e-mail informado é inválido."],
      };

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        clearInputErrors();

        // Client-side validation
        if (!email && !password) {
          markError("email");
          markError("password");
          showToast("error", "Campos obrigatórios", "Preencha o e-mail e a senha para continuar.");
          return;
        }
        if (!email) {
          markError("email");
          showToast("error", "E-mail obrigatório", "Informe seu e-mail corporativo.");
          return;
        }
        if (!/\S+@\S+\.\S+/.test(email)) {
          markError("email");
          showToast("error", "E-mail inválido", "Insira um endereço de e-mail válido.");
          return;
        }
        if (!password) {
          markError("password");
          showToast("error", "Senha obrigatória", "Informe sua senha de acesso.");
          return;
        }

        setLoading(true);
        showToast("info", "Verificando", "Validando suas credenciais...");

        try {
          await signInWithEmailAndPassword(auth, email, password);
          showToast("success", "Acesso autorizado", "Redirecionando para o painel...");
          setTimeout(() => { window.location.href = "/xpanel"; }, 1200);
        } catch (err) {
          const [title, msg] = ERROR_MESSAGES[err.code] || ["Erro ao entrar", "Ocorreu um erro inesperado. Tente novamente."];
          markError("email");
          markError("password");
          showToast("error", title, msg);
          setLoading(false);
        }
      });

      function markError(id) {
        document.getElementById(id).classList.add("input-error");
      }

      function clearInputErrors() {
        document.getElementById("email").classList.remove("input-error");
        document.getElementById("password").classList.remove("input-error");
      }

      ["email", "password"].forEach(id => {
        document.getElementById(id).addEventListener("input", function () {
          this.classList.remove("input-error");
        });
      });
    </script>

    <script>
      // ── Toast System ──────────────────────────────────────────────
      const TOAST_DURATION = 4500;

      const TOAST_ICONS = {
        error:   "ti-circle-x",
        success: "ti-circle-check",
        warning: "ti-alert-triangle",
        info:    "ti-info-circle",
      };

      function showToast(type, title, msg, duration) {
        const dur       = duration || TOAST_DURATION;
        const container = document.getElementById("toast-container");

        const toast = document.createElement("div");
        toast.className = "toast " + type;
        toast.setAttribute("role", "alert");

        toast.innerHTML =
          '<i class="ti ' + TOAST_ICONS[type] + ' toast-icon" aria-hidden="true"></i>' +
          '<div class="toast-content">' +
            '<div class="toast-title">' + title + '</div>' +
            '<div class="toast-msg">' + msg + '</div>' +
          '</div>' +
          '<span class="toast-close" onclick="removeToast(this.parentElement)" aria-label="Fechar notificação">' +
            '<i class="ti ti-x"></i>' +
          '</span>' +
          '<div class="toast-progress" style="animation-duration:' + dur + 'ms;"></div>';

        container.appendChild(toast);
        toast._timer = setTimeout(() => removeToast(toast), dur);
      }

      function removeToast(toast) {
        if (!toast || toast.classList.contains("removing")) return;
        clearTimeout(toast._timer);
        toast.classList.add("removing");
        setTimeout(() => toast.remove(), 220);
      }

      // ── Particle Animation ────────────────────────────────────────
      const canvas = document.getElementById("particlesCanvas");
      const ctx    = canvas.getContext("2d");
      let   particles = [];

      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x      = Math.random() * canvas.width;
          this.y      = Math.random() * canvas.height;
          this.size   = Math.random() * 2 + 0.5;
          this.speedX = Math.random() * 0.8 - 0.4;
          this.speedY = Math.random() * 0.8 - 0.4;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > canvas.width)  this.speedX *= -1;
          if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
        }
        draw() {
          ctx.fillStyle = "rgba(100,149,237,0.45)";
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function initParticles() {
        particles = [];
        for (let i = 0; i < 90; i++) particles.push(new Particle());
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
      }

      function resizeCanvas() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        initParticles();
      }

      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();
      animate();
    </script>

  </body>
</html>
